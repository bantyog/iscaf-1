<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Your Product</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Register Your Product</h1>
    <img src="logo.png" alt="Product Logo" width="100">

    <form action="submit_product_registration" method="POST">
      <fieldset>
        <legend>Product Details</legend>

        <label for="productName">Product Name:</label>
        <input type="text" id="productName" name="productName" placeholder="Enter product name" required>

        <label for="productCategory">Product Category:</label>
        <select id="productCategory" name="productCategory" required>
          <option value="">-- Select Category --</option>
          <option>Electronics</option>
          <option>Home Appliances</option>
          <option>Clothing</option>
          <option>Books</option>
        </select>

        <label for="purchaseDate">Purchase Date:</label>
        <input type="date" id="purchaseDate" name="purchaseDate" required>

        <label for="serialNumber">Serial Number:</label>
        <input type="text" id="serialNumber" name="serialNumber" placeholder="e.g., SN123456789" required>
      </fieldset>

      <fieldset>
        <legend>Your Information</legend>

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label>
          <input type="checkbox" id="warranty" name="warranty" value="yes">
          Opt-in for extended warranty
        </label>
      </fieldset>

      <label for="comments">Additional Comments:</label>
      <textarea id="comments" name="comments" placeholder="Write your comments here..."></textarea>

      <div class="buttons">
        <input type="submit" value="Register Product" class="submit-btn">
        <input type="reset" value="Reset" class="reset-btn">
      </div>
    </form>

    <h2>Product Compatibility</h2>
    <table>
      <caption>Product Compatibility Table</caption>
      <thead>
        <tr>
          <th>Device Type</th>
          <th>Operating System</th>
          <th>Compatible Versions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Laptop</td>
          <td>Windows</td>
          <td>10, 11</td>
        </tr>
        <tr>
          <td>Smartphone</td>
          <td>Android</td>
          <td>12, 13, 14</td>
        </tr>
        <tr>
          <td>Tablet</td>
          <td>iOS</td>
          <td>15, 16</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">Data accurate as of: <strong id="date"></strong></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <script>
    // Auto-fill current date in table footer
    document.getElementById("date").textContent = new Date().toLocaleDateString();
  </script>
</body>
</html>
