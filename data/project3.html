<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Website Example</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-3xl font-semibold text-blue-600 text-center mb-8">Welcome to Our Dynamic Website</h1>
    <div class="container mx-auto bg-white shadow-md rounded-lg p-8">
        <h2 class="text-2xl font-semibold text-gray-800 mb-6">Interactive Content</h2>
        <div id="user-info" class="mb-6">
            <p class="text-gray-700">Your Name: <span id="user-name" class="font-medium text-green-600">Guest</span></p>
            <p class="text-gray-700">Your Location: <span id="user-location" class="font-medium text-purple-600">Unknown</span></p>
            <p class="text-gray-700">Your Matric No: <span id="user-matric" class="font-medium text-blue-600">Unknown</span></p>
            <p class="text-gray-700">Your Favorite Meal: <span id="user-meal" class="font-medium text-yellow-600">Unknown</span></p>
            <p class="text-gray-700">Your Dream Car: <span id="user-car" class="font-medium text-red-600">Unknown</span></p>
        </div>
        <button id="change-name-button" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline mb-4">
            Change Your Name
        </button>
        <div id="dynamic-content" class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 mb-6" role="alert">
            <p class="font-bold">Dynamic Content Example</p>
            <p>This content is dynamically generated using JavaScript.</p>
        </div>
        <ul id="item-list" class="list-disc list-inside mb-6">
            <li class="text-gray-700">Item 1</li>
            <li class="text-gray-700">Item 2</li>
            <li class="text-gray-700">Item 3</li>
        </ul>
        <button id="add-item-button" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            Add Item to List
        </button>
    </div>
    <script>
        // Get user elements
        const userNameSpan = document.getElementById("user-name");
        const userLocationSpan = document.getElementById("user-location");
        const userMatricSpan = document.getElementById("user-matric");
        const userMealSpan = document.getElementById("user-meal");
        const userCarSpan = document.getElementById("user-car");

        // Prompt user for name and location
        const userName = prompt("Please enter your name:");
        const userLocation = prompt("Please enter your location:");
        const userMatric = prompt("Please enter your Matric Number:");
        const userMeal = prompt("Please enter your Favorite Meal:");
        const userCar = prompt("Please enter your Dream Car:");
        if (userName) {
            userNameSpan.textContent = userName;
        }
        if (userLocation) {
            userLocationSpan.textContent = userLocation;
        }
        if (userMatric) {
            userMatricSpan.textContent = userMatric;
        }
        if (userMeal) {
            userMealSpan.textContent = userMeal;
        }
        if (userCar) {
            userCarSpan.textContent = userCar;
        }

        // Handle name change
        const changeNameButton = document.getElementById("change-name-button");
        changeNameButton.addEventListener("click", () => {
            const newName = prompt("Enter your new name:");
            if (newName) {
                userNameSpan.textContent = newName;
            }
        });

        // Add user items
        const itemList = document.getElementById("item-list");
        const addItemButton = document.getElementById("add-item-button");
        addItemButton.addEventListener("click", () => {
            const newItemText = prompt("Enter the text for the new list item:");
            if (newItemText) {
                const newListItem = document.createElement("li");
                newListItem.textContent = newItemText;
                newListItem.className = "text-gray-700";
                itemList.appendChild(newListItem);
            }

            newListItem.textContent = item;
            newListItem.className = "text-gray-700";
            itemList.appendChild(newListItem);
        });
    </script>
</body>
</html>
